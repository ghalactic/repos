on:
  workflow_call:

jobs:
  observe:
    runs-on: ubuntu-latest
    name: Observe workflow runs

    steps:
      - name: Push run created event
        if: github.event.action == 'requested'
        run: |
          created_ts=$(date -d "${{ github.event.workflow_run.created_at }}" +%s)
          ts_nano="${created_ts}000000000"

          payload=$(jq -nc \
            --arg org "${{ github.event.repository.owner.login }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg workflow "${{ github.event.workflow_run.name }}" \
            --arg trigger "${{ github.event.workflow_run.event }}" \
            --arg html_url "${{ github.event.workflow_run.html_url }}" \
            --arg ts "$ts_nano" \
            '{
              resourceLogs: [{
                resource: {
                  attributes: [
                    {key: "service.name", value: {stringValue: "workflow-observability"}},
                    {key: "org", value: {stringValue: $org}}
                  ]
                },
                scopeLogs: [{
                  logRecords: [{
                    timeUnixNano: $ts,
                    severityNumber: 9,
                    severityText: "INFO",
                    body: {stringValue: "workflow run created"},
                    attributes: [
                      {key: "event", value: {stringValue: "workflow_run_created"}},
                      {key: "repo", value: {stringValue: $repo}},
                      {key: "workflow", value: {stringValue: $workflow}},
                      {key: "trigger", value: {stringValue: $trigger}},
                      {key: "html_url", value: {stringValue: $html_url}}
                    ]
                  }]
                }]
              }]
            }')

          curl -sS --fail-with-body -X POST "${{ vars.OTLP_ENDPOINT }}/v1/logs" \
            -u "${{ vars.OTLP_USERNAME }}:${{ secrets.OTLP_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Push run completed event
        if: github.event.action == 'completed'
        run: |
          started_ts=$(date -d "${{ github.event.workflow_run.run_started_at }}" +%s)
          updated_ts=$(date -d "${{ github.event.workflow_run.updated_at }}" +%s)
          duration=$(( updated_ts - started_ts ))
          ts_nano="${updated_ts}000000000"

          payload=$(jq -nc \
            --arg org "${{ github.event.repository.owner.login }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg workflow "${{ github.event.workflow_run.name }}" \
            --arg trigger "${{ github.event.workflow_run.event }}" \
            --arg conclusion "${{ github.event.workflow_run.conclusion }}" \
            --argjson duration "$duration" \
            --arg html_url "${{ github.event.workflow_run.html_url }}" \
            --arg ts "$ts_nano" \
            '{
              resourceLogs: [{
                resource: {
                  attributes: [
                    {key: "service.name", value: {stringValue: "workflow-observability"}},
                    {key: "org", value: {stringValue: $org}}
                  ]
                },
                scopeLogs: [{
                  logRecords: [{
                    timeUnixNano: $ts,
                    severityNumber: 9,
                    severityText: "INFO",
                    body: {stringValue: "workflow run completed"},
                    attributes: [
                      {key: "event", value: {stringValue: "workflow_run_completed"}},
                      {key: "repo", value: {stringValue: $repo}},
                      {key: "workflow", value: {stringValue: $workflow}},
                      {key: "trigger", value: {stringValue: $trigger}},
                      {key: "conclusion", value: {stringValue: $conclusion}},
                      {key: "duration_seconds", value: {intValue: $duration}},
                      {key: "html_url", value: {stringValue: $html_url}}
                    ]
                  }]
                }]
              }]
            }')

          curl -sS --fail-with-body -X POST "${{ vars.OTLP_ENDPOINT }}/v1/logs" \
            -u "${{ vars.OTLP_USERNAME }}:${{ secrets.OTLP_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "$payload"
