on:
  workflow_call:

jobs:
  report:
    runs-on: ubuntu-latest
    name: Report workflow change metrics

    steps:
      - name: Push change metrics
        run: |
          workflow_files=$(
            echo '${{ toJSON(github.event.commits) }}' \
              | jq -r '[.[]  | ((.added // [])[], (.modified // [])[])] | unique[] | select(startswith(".github/workflows/"))'
          )

          if [ -z "$workflow_files" ]; then
            echo "No workflow files changed"
            exit 0
          fi

          ts=$(date +%s)
          ts_nano="${ts}000000000"

          echo "$workflow_files" | while read -r file; do
            echo "Pushing metric for ${file}"

            payload=$(jq -nc \
              --arg name "workflow_changed_timestamp_seconds" \
              --arg org "${{ github.event.repository.owner.login }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg workflow_file "$file" \
              --argjson value "$ts" \
              --arg ts "$ts_nano" \
              '{
                resourceMetrics: [{
                  resource: {
                    attributes: [
                      {key: "org", value: {stringValue: $org}}
                    ]
                  },
                  scopeMetrics: [{
                    metrics: [{
                      name: $name,
                      gauge: {
                        dataPoints: [{
                          asDouble: $value,
                          timeUnixNano: $ts,
                          attributes: [
                            {key: "repo", value: {stringValue: $repo}},
                            {key: "workflow_file", value: {stringValue: $workflow_file}}
                          ]
                        }]
                      }
                    }]
                  }]
                }]
              }')

            curl -sS --fail-with-body -X POST "${{ vars.OTLP_ENDPOINT }}/v1/metrics" \
              -u "${{ vars.OTLP_USERNAME }}:${{ secrets.OTLP_PASSWORD }}" \
              -H "Content-Type: application/json" \
              -d "$payload"
          done
