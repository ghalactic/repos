on:
  workflow_call:

jobs:
  report:
    runs-on: ubuntu-latest
    name: Report workflow change metrics

    steps:
      - name: Find changed workflow files
        id: changed
        uses: actions/github-script@v9
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const changed = commit.files
              .map((f) => f.filename)
              .filter((f) => f.startsWith(".github/workflows/"));

            core.setOutput("files", changed.join("\n"));

      - name: Push change events
        if: steps.changed.outputs.files != ''
        run: |
          ts=$(date +%s)
          ts_nano="${ts}000000000"

          echo "${{ steps.changed.outputs.files }}" | while read -r file; do
            [ -z "$file" ] && continue
            echo "Pushing event for ${file}"

            payload=$(jq -nc \
              --arg org "${{ github.event.repository.owner.login }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg workflow_file "$file" \
              --arg ts "$ts_nano" \
              '{
                resourceLogs: [{
                  resource: {
                    attributes: [
                      {key: "service.name", value: {stringValue: "workflow-observability"}},
                      {key: "org", value: {stringValue: $org}}
                    ]
                  },
                  scopeLogs: [{
                    logRecords: [{
                      timeUnixNano: $ts,
                      severityNumber: 9,
                      severityText: "INFO",
                      body: {stringValue: "workflow file changed"},
                      attributes: [
                        {key: "event", value: {stringValue: "workflow_changed"}},
                        {key: "repo", value: {stringValue: $repo}},
                        {key: "workflow_file", value: {stringValue: $workflow_file}}
                      ]
                    }]
                  }]
                }]
              }')

            curl -sS --fail-with-body -X POST "${{ vars.OTLP_ENDPOINT }}/v1/logs" \
              -u "${{ vars.OTLP_USERNAME }}:${{ secrets.OTLP_PASSWORD }}" \
              -H "Content-Type: application/json" \
              -d "$payload"
          done
