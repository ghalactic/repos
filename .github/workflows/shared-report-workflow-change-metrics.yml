on:
  workflow_call:

jobs:
  report:
    runs-on: ubuntu-latest
    name: Report workflow change metrics

    steps:
      - name: Find changed workflow files
        id: changed
        uses: actions/github-script@v9
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const changed = commit.files
              .map((f) => f.filename)
              .filter((f) => f.startsWith(".github/workflows/"));

            core.setOutput("files", changed.join("\n"));

      - name: Push change metrics
        if: steps.changed.outputs.files != ''
        run: |
          ts=$(date +%s)
          ts_nano="${ts}000000000"

          echo "${{ steps.changed.outputs.files }}" | while read -r file; do
            [ -z "$file" ] && continue
            echo "Pushing metric for ${file}"

            payload=$(jq -nc \
              --arg name "workflow_changed_timestamp_seconds" \
              --arg org "${{ github.event.repository.owner.login }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg workflow_file "$file" \
              --argjson value "$ts" \
              --arg ts "$ts_nano" \
              '{
                resourceMetrics: [{
                  resource: {
                    attributes: [
                      {key: "org", value: {stringValue: $org}}
                    ]
                  },
                  scopeMetrics: [{
                    metrics: [{
                      name: $name,
                      gauge: {
                        dataPoints: [{
                          asDouble: $value,
                          timeUnixNano: $ts,
                          attributes: [
                            {key: "repo", value: {stringValue: $repo}},
                            {key: "workflow_file", value: {stringValue: $workflow_file}}
                          ]
                        }]
                      }
                    }]
                  }]
                }]
              }')

            curl -sS --fail-with-body -X POST "${{ vars.OTLP_ENDPOINT }}/v1/metrics" \
              -u "${{ vars.OTLP_USERNAME }}:${{ secrets.OTLP_PASSWORD }}" \
              -H "Content-Type: application/json" \
              -d "$payload"
          done
